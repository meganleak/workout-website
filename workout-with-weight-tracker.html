<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5-Day Lean Bulk Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg: #0a0a0b; --surface: #111114; --card: #16161a; --border: #2a2a32;
    --accent: #c8f135; --accent2: #4af0b4; --text: #e8e8ec; --muted: #6b6b7a; --red: #ff5757;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .container { max-width: 780px; margin: 0 auto; }

  header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--accent);
    color: #0a0a0b;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    line-height: 0.9;
    margin-bottom: 14px;
  }

  h1 span { color: var(--accent); }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .day-header {
    padding: 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .day-body { display: none; padding: 16px; }

  .day-card.open .day-body { display: block; }

  .ex-weight {
    color: var(--accent);
    cursor: text;
  }

  .week-schedule {
    margin-top: 20px;
    background: var(--card);
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  button {
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">

<header>
  <div class="tag">Lean Bulk · Editable</div>
  <h1>5-DAY<br/><span>LEAN</span><br/>SPLIT</h1>
</header>

<!-- DAY 1 -->
<div class="day-card open">
  <div class="day-header" onclick="toggle(this)">Chest + Triceps</div>
  <div class="day-body">
    Flat DB Bench — <span class="ex-weight" contenteditable="true">65–70 lb</span><br/>
    Incline DB Press — <span class="ex-weight" contenteditable="true">50–55 lb</span>
  </div>
</div>

<!-- DAY 2 -->
<div class="day-card">
  <div class="day-header" onclick="toggle(this)">Back + Biceps</div>
  <div class="day-body">
    Pull-ups — <span class="ex-weight" contenteditable="true">15 lb assist</span><br/>
    Lat Pulldown — <span class="ex-weight" contenteditable="true">100–110 lb</span>
  </div>
</div>

<!-- BODYWEIGHT TRACKER -->
<div class="week-schedule">
  <div class="section-label">Bodyweight Tracker</div>

  <div style="display:flex; gap:10px; margin-bottom:12px;">
    <input id="weightInput" type="number" step="0.1" placeholder="Enter weight (lb)"
      style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text);" />

    <button onclick="addWeight()"
      style="padding:10px 14px; border:none; border-radius:8px; background:var(--accent); font-weight:600;">
      Add
    </button>
  </div>

  <div id="weightList" style="font-size:13px; color:var(--muted); line-height:1.6;"></div>
</div>

</div>

<script>
function toggle(el) {
  el.parentElement.classList.toggle("open");
}

// Save workout weights
document.querySelectorAll('.ex-weight').forEach(el => {
  el.addEventListener('input', () => {
    localStorage.setItem('weights', document.body.innerHTML);
  });
});

// Bodyweight tracker
const WEIGHT_KEY = 'bodyweight_log_v1';

function addWeight() {
  const input = document.getElementById('weightInput');
  const weight = input.value.trim();
  if (!weight) return;

  const data = JSON.parse(localStorage.getItem(WEIGHT_KEY) || '[]');

  data.unshift({
    date: new Date().toLocaleDateString(),
    weight
  });

  localStorage.setItem(WEIGHT_KEY, JSON.stringify(data));

  input.value = '';
  loadWeights();
}

function loadWeights() {
  const list = document.getElementById('weightList');
  const data = JSON.parse(localStorage.getItem(WEIGHT_KEY) || '[]');

  list.innerHTML = data.length
    ? data.map(e => `${e.date} — <strong style="color:var(--accent)">${e.weight} lb</strong>`).join("<br>")
    : "No entries yet.";
}

loadWeights();
</script>

</body>
</html>
